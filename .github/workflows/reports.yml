name: Automated Reports

on:
  schedule:
    - cron: '0 19 * * *'     # Her gün 19:00 UTC (22:00 TR) — günlük
    - cron: '0 21 * * 0'     # Her Pazar 21:00 UTC (00:00 Pazartesi TR) — haftalık
    - cron: '0 21 1 * *'     # Her ayın 1'i 21:00 UTC — aylık
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Rapor tipi'
        required: true
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          REPORT_TYPE: ${{ github.event.inputs.report_type || '' }}
        run: node scripts/auto-report.js
