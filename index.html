<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tarih Vakfı</title>
  <meta name="description" content="Tarih Vakfı – Türkiye'de tarih bilincini geliştirmek ve tarihî mirası korumak amacıyla çalışan bağımsız sivil toplum kuruluşu." />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./css/main.css" />
  <style>
    .construction {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 0;
    }
    .construction-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    .construction h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin-bottom: .5rem;
    }
    .construction .lead {
      max-width: 50ch;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="./">
        <img src="./assets/logo-placeholder.svg" alt="Tarih Vakfı" />
        <span>Tarih Vakfı</span>
      </a>
      <nav class="nav-links">
        <a class="btn btn-primary" href="./auth/">Giriş / Başvuru</a>
      </nav>
    </div>
  </header>

  <main class="construction">
    <div>
      <div class="construction-icon">&#128679;</div>
      <h1>Sitemiz yapım aşamasında</h1>
      <p class="lead">Tarih Vakfı Gönüllü Takip Sistemi çok yakında hizmetinizde olacak. Gönüllü başvurusu yapmak için giriş yapabilirsiniz.</p>
      <div class="actions" style="justify-content:center;">
        <a class="btn btn-primary" href="./auth/">Giriş / Başvuru</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-row">
      <p>&copy; Tarih Vakfı</p>
      <a href="./auth/">Gönüllü portalı</a>
    </div>
  </footer>
</body>
</html>
